<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KNZN – Dein Wunschkennzeichen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════ HERO ══ -->
  <section class="hero">
    <img
      src="hero.jpg"
      class="hero-img"
      alt="Audi mit Wunschkennzeichen"
    />
    <div class="hero-content">
      <div class="hero-text">
        <h1>Dein Kennzeichen.<br />Dein Style.</h1>
        <p>Erstelle dein individuelles Wunschkennzeichen als echtes Aluminiumschild.</p>
        <a href="#konfigurator" class="btn-primary">Jetzt konfigurieren</a>
      </div>
      <!-- Canvas floats over the Audi plate in the photo -->
      <div class="hero-plate-wrapper">
        <canvas id="heroPlate" width="480" height="102"></canvas>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════ KONFIGURATOR ══ -->
  <section id="konfigurator" class="konfigurator">
    <div class="container">
      <h2>Kennzeichen konfigurieren</h2>

      <!-- Live preview canvas -->
      <div class="canvas-wrapper">
        <canvas id="plateCanvas" width="520" height="110"></canvas>
      </div>

      <!-- Input fields -->
      <div class="input-row">
        <div class="input-group">
          <label for="district">Ortskennung (z.B. KN)</label>
          <input type="text" id="district" maxlength="3" placeholder="KN" />
        </div>
        <div class="input-group">
          <label for="letters">Buchstaben (z.B. AB)</label>
          <input type="text" id="letters" maxlength="2" placeholder="AB" />
        </div>
        <div class="input-group">
          <label for="numbers">Ziffern (z.B. 1234)</label>
          <input type="text" id="numbers" maxlength="4" placeholder="1234" />
        </div>
      </div>

      <!-- Plate type strip -->
      <div class="section-label">Kennzeichentyp</div>
      <div class="plate-type-strip" id="plateTypeStrip">

        <button class="plate-type-btn active" data-type="standard" onclick="setPlateType('standard')">
          <!-- Standard plate SVG -->
          <svg width="110" height="28" viewBox="0 0 110 28" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="108" height="26" rx="3" fill="#fff" stroke="#111" stroke-width="1.5"/>
            <rect x="1" y="1" width="16" height="26" rx="3" fill="#003399"/>
            <rect x="14" y="1" width="3" height="26" fill="#003399"/>
            <!-- EU stars -->
            <g fill="#FFD700" font-size="4" font-family="Arial" text-anchor="middle">
              <text x="8.5" y="8">★</text>
              <text x="8.5" y="15">★★</text>
              <text x="8.5" y="22">★</text>
            </g>
            <text x="8.5" y="27" font-size="5" font-family="Arial" font-weight="bold" fill="#FFD700" text-anchor="middle">D</text>
            <text x="60" y="21" font-size="14" font-family="Arial Narrow,Arial" font-weight="bold" fill="#111" text-anchor="middle">XX AB 123</text>
          </svg>
          <span class="plate-type-label">Standard</span>
        </button>

        <button class="plate-type-btn" data-type="H" onclick="setPlateType('H')">
          <!-- H-Kennzeichen SVG -->
          <svg width="122" height="28" viewBox="0 0 122 28" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="120" height="26" rx="3" fill="#fffde7" stroke="#111" stroke-width="1.5"/>
            <rect x="1" y="1" width="16" height="26" rx="3" fill="#003399"/>
            <rect x="14" y="1" width="3" height="26" fill="#003399"/>
            <g fill="#FFD700" font-size="4" font-family="Arial" text-anchor="middle">
              <text x="8.5" y="8">★</text>
              <text x="8.5" y="15">★★</text>
              <text x="8.5" y="22">★</text>
            </g>
            <text x="8.5" y="27" font-size="5" font-family="Arial" font-weight="bold" fill="#FFD700" text-anchor="middle">D</text>
            <text x="66" y="21" font-size="14" font-family="Arial Narrow,Arial" font-weight="bold" fill="#111" text-anchor="middle">XX AB 123H</text>
          </svg>
          <span class="plate-type-label">H-Oldtimer</span>
        </button>

        <button class="plate-type-btn" data-type="E" onclick="setPlateType('E')">
          <!-- E-Kennzeichen SVG -->
          <svg width="122" height="28" viewBox="0 0 122 28" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="120" height="26" rx="3" fill="#fff" stroke="#006400" stroke-width="1.5"/>
            <rect x="1" y="1" width="16" height="26" rx="3" fill="#006400"/>
            <rect x="14" y="1" width="3" height="26" fill="#006400"/>
            <g fill="#FFD700" font-size="4" font-family="Arial" text-anchor="middle">
              <text x="8.5" y="8">★</text>
              <text x="8.5" y="15">★★</text>
              <text x="8.5" y="22">★</text>
            </g>
            <text x="8.5" y="27" font-size="5" font-family="Arial" font-weight="bold" fill="#FFD700" text-anchor="middle">D</text>
            <text x="66" y="21" font-size="14" font-family="Arial Narrow,Arial" font-weight="bold" fill="#1a5c1a" text-anchor="middle">XX AB 123E</text>
          </svg>
          <span class="plate-type-label">E-Elektro</span>
        </button>

      </div>

      <!-- Suffix buttons -->
      <div class="section-label">Suffix</div>
      <div class="suffix-btns">
        <button class="suffix-btn active" data-suffix="" onclick="setSuffix('')">Keiner</button>
        <button class="suffix-btn" data-suffix="H" onclick="setSuffix('H')">H-Oldtimer</button>
        <button class="suffix-btn" data-suffix="E" onclick="setSuffix('E')">E-Elektro</button>
      </div>

      <!-- Quantity & price summary -->
      <div class="order-summary">
        <div class="summary-plate-wrapper">
          <canvas id="summaryPlate" width="260" height="55"></canvas>
        </div>
        <div class="summary-details">
          <div class="summary-row">
            <label for="quantity">Anzahl</label>
            <select id="quantity">
              <option value="1">1 Schild – 19,90 €</option>
              <option value="2">2 Schilder (vorne + hinten) – 34,90 €</option>
            </select>
          </div>
          <div class="summary-total" id="summaryTotal">Gesamt: 19,90 €</div>
        </div>
      </div>

      <!-- Checkout error -->
      <div id="checkout-error" class="checkout-error" style="display:none;"></div>

      <!-- Checkout button -->
      <button class="btn-checkout" id="checkoutBtn" onclick="handleCheckout()">
        Jetzt bestellen →
      </button>

    </div>
  </section>

  <!-- ═══════════════════════════════════════════════ FOOTER ══ -->
  <footer class="footer">
    <p>© 2025 KNZN – Wunschkennzeichen · <a href="mailto:info@knzn.de">Kontakt</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
